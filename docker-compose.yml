version: "3.9"

services:
  backend:
    build: ./backend
    container_name: sentinelmesh-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: sentinelmesh-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
